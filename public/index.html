<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuilderScan - Real Builder Detection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .header .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    .scan-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .input-group {
      display: flex;
      gap: 15px;
    }
    
    input {
      flex: 1;
      padding: 15px 20px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    button {
      padding: 15px 30px;
      font-size: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #667eea;
      margin-top: 20px;
    }
    
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: none;
    }
    
    .result-card.show {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .profile-header {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .profile-info h2 {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    
    .profile-info .username {
      color: #666;
      margin-bottom: 10px;
    }
    
    .tier-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: bold;
      margin-top: 10px;
    }
    
    .score-section {
      display: flex;
      gap: 20px;
      margin: 30px 0;
    }
    
    .score-card {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
    }
    
    .score-number {
      font-size: 4rem;
      font-weight: bold;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    
    .metric-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border-left: 4px solid #667eea;
    }
    
    .metric-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .breakdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin: 20px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    
    .breakdown-item {
      text-align: center;
    }
    
    .breakdown-label {
      font-size: 0.8rem;
      color: #666;
    }
    
    .breakdown-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
    }
    
    .repo-list {
      margin-top: 20px;
    }
    
    .repo-item {
      background: #f8f9fa;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border-left: 4px solid;
    }
    
    .repo-valid {
      border-left-color: #00b894;
    }
    
    .repo-spam {
      border-left-color: #ff4757;
    }
    
    .repo-empty {
      border-left-color: #95a5a6;
    }
    
    .repo-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .repo-status {
      font-size: 0.85rem;
      color: #666;
    }
    
    .analysis-message {
      background: #e8f5e9;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      border-left: 4px solid #00b894;
    }
    
    .leaderboard {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .error {
      background: #ff4757;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }
    
    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .input-group {
        flex-direction: column;
      }
      
      .score-section {
        flex-direction: column;
      }
      
      .breakdown-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏗️ BuilderScan</h1>
      <div class="subtitle">Detect Real Builders • Score GitHub Activity • Like BaseName</div>
    </div>
    
    <div class="scan-card">
      <div class="input-group">
        <input type="text" id="username" placeholder="Enter GitHub username (e.g., vish731)" />
        <button onclick="scanBuilder()">🔍 Scan Builder</button>
      </div>
      <div id="loading" class="loading" style="display: none;">⏳ Scanning GitHub activity... (this may take a few seconds)</div>
    </div>
    
    <div id="result" class="result-card"></div>
    
    <div class="leaderboard">
      <h2>🏆 Builder Leaderboard</h2>
      <div id="leaderboard">No builders scanned yet. Start scanning!</div>
    </div>
  </div>
  
  <script>
    async function scanBuilder() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        alert('Please enter a GitHub username');
        return;
      }
      
      const loading = document.getElementById('loading');
      const resultDiv = document.getElementById('result');
      
      loading.style.display = 'block';
      resultDiv.classList.remove('show');
      
      try {
        const response = await fetch(`/api/scan/${username}`);
        const data = await response.json();
        
        if (data.success) {
          displayResult(data.builder);
          displayLeaderboard(data.leaderboard);
        } else {
          showError(data.error || 'User not found');
        }
      } catch (error) {
        console.error('Error:', error);
        showError('Cannot connect to server. Make sure server is running on port 3000');
      } finally {
        loading.style.display = 'none';
      }
    }
    
    function displayResult(builder) {
      const resultDiv = document.getElementById('result');
      const tier = builder.tier;
      
      resultDiv.innerHTML = `
        <div class="profile-header">
          <img src="${builder.avatar}" class="avatar">
          <div class="profile-info">
            <h2>${builder.name}</h2>
            <div class="username">@${builder.username}</div>
            <div class="tier-badge" style="background: ${tier.color}; color: white;">
              ${tier.emoji} ${tier.name}
            </div>
            ${builder.bio ? `<p style="margin-top: 10px;">${builder.bio}</p>` : ''}
          </div>
        </div>
        
        <div class="score-section">
          <div class="score-card">
            <div class="score-number">${builder.builderScore}</div>
            <div>Builder Score / 100</div>
          </div>
          <div class="score-card" style="background: ${tier.color}">
            <div class="score-number">${tier.emoji}</div>
            <div>${tier.name}</div>
          </div>
        </div>
        
        <div class="analysis-message">
          <strong>📝 Analysis:</strong><br>
          ${builder.analysisMessage}
        </div>
        
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-value">${builder.stats.codeRepos}</div>
            <div>Valid Repos (with code)</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalMeaningfulCommits}</div>
            <div>Meaningful Commits</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalSpamCommits}</div>
            <div>Spam Commits (Ignored)</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalStars}</div>
            <div>⭐ Total Stars</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.followers}</div>
            <div>👥 Followers</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.accountAge}</div>
            <div>📅 Account Age</div>
          </div>
        </div>
        
        <div class="breakdown-grid">
          <div class="breakdown-item">
            <div class="breakdown-label">Code Repos</div>
            <div class="breakdown-value">${builder.scoreBreakdown.repoScore}/35</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-label">Commits</div>
            <div class="breakdown-value">${builder.scoreBreakdown.commitScore}/35</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-label">Stars</div>
            <div class="breakdown-value">${builder.scoreBreakdown.starScore}/15</div>
          </div>
          <div class="breakdown-item">
            <div class="breakdown-label">Spam Penalty</div>
            <div class="breakdown-value">-${builder.scoreBreakdown.spamPenalty}</div>
          </div>
        </div>
        
        <h3>📁 Repository Analysis</h3>
        <div class="repo-list">
          ${builder.repositories.map(repo => `
            <div class="repo-item repo-${repo.status}">
              <div class="repo-name">
                ${repo.name}
                ${repo.status === 'valid' ? '✅' : repo.status === 'spam' ? '⚠️' : '❌'}
              </div>
              <div class="repo-status">
                ${repo.status === 'valid' ? 
                  `${repo.meaningfulCommits} meaningful commits • ${repo.codeFiles} code files • ⭐ ${repo.stars || 0} stars` : 
                  repo.reason || 'No meaningful activity'}
              </div>
              ${repo.description ? `<small>${repo.description}</small>` : ''}
            </div>
          `).join('')}
        </div>
      `;
      
      resultDiv.classList.add('show');
    }
    
    function displayLeaderboard(builders) {
      const leaderboardDiv = document.getElementById('leaderboard');
      
      if (!builders || builders.length === 0) {
        leaderboardDiv.innerHTML = 'No builders scanned yet. Start scanning!';
        return;
      }
      
      leaderboardDiv.innerHTML = builders.map((b, i) => `
        <div class="leaderboard-item">
          <span style="font-weight: bold;">#${i+1}</span>
          <span><strong>@${b.username}</strong></span>
          <span style="color: #667eea; font-weight: bold;">${b.score}/100</span>
          <span>${b.tier}</span>
        </div>
      `).join('');
    }
    
    function showError(message) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `<div class="error">❌ Error: ${message}</div>`;
      resultDiv.classList.add('show');
    }
    
    // Load leaderboard on page load
    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/leaderboard');
        const data = await response.json();
        if (data.success) {
          displayLeaderboard(data.builders);
        }
      } catch (error) {
        console.error('Error loading leaderboard:', error);
      }
    }
    
    loadLeaderboard();
    
    // Enter key support
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') scanBuilder();
    });
  </script>
</body>
</html>
