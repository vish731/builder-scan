<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuilderScan - Real Builder Detection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    .scan-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .input-group {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    
    input {
      flex: 1;
      padding: 15px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      padding: 15px 30px;
      font-size: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #667eea;
    }
    
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: none;
    }
    
    .result-card.show {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .profile-header {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .profile-info h2 {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    
    .profile-info .username {
      color: #666;
      margin-bottom: 10px;
    }
    
    .score-section {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .score-card {
      flex: 1;
      text-align: center;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 15px;
    }
    
    .score-number {
      font-size: 3rem;
      font-weight: bold;
    }
    
    .spammer-badge {
      background: #ff4757;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      display: inline-block;
      margin-top: 10px;
    }
    
    .real-builder-badge {
      background: #00b894;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      display: inline-block;
      margin-top: 10px;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .metric-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }
    
    .metric-title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }
    
    .metric-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .warning-list {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }
    
    .warning-list h4 {
      margin-bottom: 10px;
      color: #856404;
    }
    
    .warning-list ul {
      margin-left: 20px;
    }
    
    .leaderboard {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .leaderboard h2 {
      margin-bottom: 20px;
    }
    
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .leaderboard-rank {
      font-weight: bold;
      width: 50px;
    }
    
    .leaderboard-user {
      flex: 1;
    }
    
    .leaderboard-score {
      font-weight: bold;
      color: #667eea;
    }
    
    .spammer-tag {
      background: #ff4757;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-left: 10px;
    }
    
    @media (max-width: 768px) {
      .input-group {
        flex-direction: column;
      }
      
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .score-section {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔎 BuilderScan</h1>
      <p>Detect Real Builders vs GitHub Spammers</p>
    </div>
    
    <div class="scan-card">
      <div class="input-group">
        <input type="text" id="username" placeholder="Enter GitHub username (e.g., vish731)" />
        <button onclick="scanBuilder()">🔍 Scan Builder</button>
      </div>
      <div id="loading" class="loading" style="display: none;">Scanning GitHub activity...</div>
    </div>
    
    <div id="result" class="result-card"></div>
    
    <div class="leaderboard">
      <h2>🏆 Builder Leaderboard</h2>
      <div id="leaderboard">Loading...</div>
    </div>
  </div>
  
  <script>
    let currentLeaderboard = [];
    
    async function scanBuilder() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        alert('Please enter a GitHub username');
        return;
      }
      
      const loading = document.getElementById('loading');
      const resultDiv = document.getElementById('result');
      
      loading.style.display = 'block';
      resultDiv.classList.remove('show');
      
      try {
        const response = await fetch(`/api/scan/${username}`);
        const data = await response.json();
        
        if (data.success) {
          displayResult(data.builder);
          currentLeaderboard = data.leaderboard;
          displayLeaderboard(currentLeaderboard);
        } else {
          showError(data.error);
        }
      } catch (error) {
        showError('Network error. Make sure the server is running.');
      } finally {
        loading.style.display = 'none';
      }
    }
    
    function displayResult(builder) {
      const resultDiv = document.getElementById('result');
      
      const isSpammer = builder.isSpammer;
      const badgeClass = isSpammer ? 'spammer-badge' : 'real-builder-badge';
      const badgeText = isSpammer ? '⚠️ Spammer Detected' : '✅ Real Builder';
      
      resultDiv.innerHTML = `
        <div class="profile-header">
          <img src="${builder.avatar}" alt="${builder.username}" class="avatar">
          <div class="profile-info">
            <h2>${builder.name}</h2>
            <div class="username">@${builder.username}</div>
            <div class="${badgeClass}">${badgeText}</div>
            ${builder.bio ? `<p style="margin-top: 10px;">${builder.bio}</p>` : ''}
          </div>
        </div>
        
        <div class="score-section">
          <div class="score-card">
            <div class="score-number">${builder.builderScore}</div>
            <div>Builder Score</div>
          </div>
          <div class="score-card" style="background: ${isSpammer ? '#ff4757' : '#00b894'}">
            <div class="score-number">${isSpammer ? builder.spamConfidence + '%' : 'Clean'}</div>
            <div>${isSpammer ? 'Spam Confidence' : 'Trust Score'}</div>
          </div>
        </div>
        
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-title">📊 Quality Repos</div>
            <div class="metric-value">${builder.scoreDetails.qualityRepos.count}</div>
            <small>Score: ${builder.scoreDetails.qualityRepos.score}/${builder.scoreDetails.qualityRepos.maxScore}</small>
          </div>
          <div class="metric-card">
            <div class="metric-title">⭐ Total Stars</div>
            <div class="metric-value">${builder.scoreDetails.stars.total}</div>
            <small>Score: ${builder.scoreDetails.stars.score}/${builder.scoreDetails.stars.maxScore}</small>
          </div>
          <div class="metric-card">
            <div class="metric-title">🔄 Active Repos</div>
            <div class="metric-value">${builder.scoreDetails.activeRepos.count}</div>
            <small>Score: ${builder.scoreDetails.activeRepos.score}/${builder.scoreDetails.activeRepos.maxScore}</small>
          </div>
          <div class="metric-card">
            <div class="metric-title">💻 Total Commits</div>
            <div class="metric-value">${builder.commits.totalCommits}</div>
            <small>Recent: ${builder.commits.recentCommits} commits (30 days)</small>
          </div>
          <div class="metric-card">
            <div class="metric-title">👥 Followers</div>
            <div class="metric-value">${builder.followers}</div>
            <small>Following: ${builder.following}</small>
          </div>
          <div class="metric-card">
            <div class="metric-title">📅 Account Age</div>
            <div class="metric-value">${builder.scoreDetails.accountAge.years} years</div>
            <small>Created: ${new Date(builder.accountCreated).toLocaleDateString()}</small>
          </div>
        </div>
        
        ${isSpammer ? `
          <div class="warning-list">
            <h4>🚨 Spam Indicators Found:</h4>
            <ul>
              ${builder.spamIndicators.map(indicator => `<li>${indicator}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
        
        ${builder.topRepos.length > 0 ? `
          <div style="margin-top: 20px;">
            <h3>🏆 Top Repositories</h3>
            ${builder.topRepos.map(repo => `
              <div class="metric-card" style="margin-top: 10px;">
                <div class="metric-title">
                  <a href="${repo.url}" target="_blank">${repo.name}</a>
                </div>
                <div>${repo.description || 'No description'}</div>
                <small>⭐ ${repo.stars} stars | 🍴 ${repo.forks} forks | ${repo.language || 'No language'}</small>
              </div>
            `).join('')}
          </div>
        ` : ''}
      `;
      
      resultDiv.classList.add('show');
    }
    
    function displayLeaderboard(builders) {
      const leaderboardDiv = document.getElementById('leaderboard');
      
      if (!builders || builders.length === 0) {
        leaderboardDiv.innerHTML = '<p>No builders scanned yet. Start scanning!</p>';
        return;
      }
      
      leaderboardDiv.innerHTML = `
        ${builders.map((builder, index) => `
          <div class="leaderboard-item">
            <div class="leaderboard-rank">#${index + 1}</div>
            <div class="leaderboard-user">
              @${builder.username}
              ${builder.isSpammer ? '<span class="spammer-tag">Spammer</span>' : ''}
            </div>
            <div class="leaderboard-score">${builder.score}</div>
          </div>
        `).join('')}
      `;
    }
    
    function showError(message) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `
        <div style="background: #ff4757; color: white; padding: 20px; border-radius: 10px;">
          <h3>❌ Error</h3>
          <p>${message}</p>
        </div>
      `;
      resultDiv.classList.add('show');
    }
    
    // Load initial leaderboard
    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/leaderboard');
        const data = await response.json();
        if (data.success) {
          displayLeaderboard(data.builders);
        }
      } catch (error) {
        console.error('Error loading leaderboard:', error);
      }
    }
    
    // Load leaderboard on page load
    loadLeaderboard();
    
    // Allow Enter key to search
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        scanBuilder();
      }
    });
  </script>
</body>
</html>
