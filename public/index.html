<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuilderScan - Real Builder Detection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }
    
    .header h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    
    .header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    .scan-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .input-group {
      display: flex;
      gap: 15px;
    }
    
    input {
      flex: 1;
      padding: 15px;
      font-size: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      padding: 15px 30px;
      font-size: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #667eea;
      margin-top: 20px;
    }
    
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: none;
    }
    
    .result-card.show {
      display: block;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .profile-header {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .profile-info h2 {
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    
    .profile-info .username {
      color: #666;
      margin-bottom: 10px;
    }
    
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-top: 10px;
    }
    
    .real-builder {
      background: #00b894;
      color: white;
    }
    
    .fake-builder {
      background: #ff4757;
      color: white;
    }
    
    .score-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .score-number {
      font-size: 4rem;
      font-weight: bold;
    }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    
    .metric-card {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    
    .metric-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #667eea;
    }
    
    .reasons-list {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
    }
    
    .repo-item {
      background: #f8f9fa;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    
    .repo-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .repo-stars {
      color: #f39c12;
    }
    
    .leaderboard {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .error {
      background: #ff4757;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }
    
    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .input-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔎 BuilderScan</h1>
      <p>Detect Real Builders vs GitHub Spammers</p>
    </div>
    
    <div class="scan-card">
      <div class="input-group">
        <input type="text" id="username" placeholder="Enter GitHub username (e.g., vish731)" />
        <button onclick="scanBuilder()">🔍 Scan Builder</button>
      </div>
      <div id="loading" class="loading" style="display: none;">⏳ Scanning GitHub activity...</div>
    </div>
    
    <div id="result" class="result-card"></div>
    
    <div class="leaderboard">
      <h2>🏆 Builder Leaderboard</h2>
      <div id="leaderboard">No builders scanned yet. Start scanning!</div>
    </div>
  </div>
  
  <script>
    async function scanBuilder() {
      const username = document.getElementById('username').value.trim();
      if (!username) {
        alert('Please enter a GitHub username');
        return;
      }
      
      const loading = document.getElementById('loading');
      const resultDiv = document.getElementById('result');
      
      loading.style.display = 'block';
      resultDiv.classList.remove('show');
      
      try {
        const response = await fetch(`/api/scan/${username}`);
        const data = await response.json();
        
        if (data.success) {
          displayResult(data.builder);
          displayLeaderboard(data.leaderboard);
        } else {
          showError(data.error || 'User not found');
        }
      } catch (error) {
        console.error('Error:', error);
        showError('Cannot connect to server. Make sure server is running on port 3000');
      } finally {
        loading.style.display = 'none';
      }
    }
    
    function displayResult(builder) {
      const resultDiv = document.getElementById('result');
      const badgeClass = builder.isRealBuilder ? 'real-builder' : 'fake-builder';
      const badgeText = builder.isRealBuilder ? '✅ REAL BUILDER' : '⚠️ NOT A BUILDER';
      
      resultDiv.innerHTML = `
        <div class="profile-header">
          <img src="${builder.avatar}" class="avatar">
          <div class="profile-info">
            <h2>${builder.name}</h2>
            <div class="username">@${builder.username}</div>
            <div class="badge ${badgeClass}">${badgeText}</div>
            ${builder.bio ? `<p style="margin-top: 10px;">${builder.bio}</p>` : ''}
          </div>
        </div>
        
        <div class="score-card">
          <div class="score-number">${builder.builderScore}</div>
          <div>Builder Score / 100</div>
        </div>
        
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-value">${builder.stats.reposWithCode}</div>
            <div>Repos with Code</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalCommits}</div>
            <div>Total Commits</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.recentCommits}</div>
            <div>Recent Commits (90d)</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalStars}</div>
            <div>Total Stars</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.followers}</div>
            <div>Followers</div>
          </div>
          <div class="metric-card">
            <div class="metric-value">${builder.stats.totalRepos}</div>
            <div>Total Repos</div>
          </div>
        </div>
        
        <div class="reasons-list">
          <strong>📊 Analysis:</strong>
          ${builder.reasons.map(r => `<div>${r}</div>`).join('')}
        </div>
        
        ${builder.repos.length > 0 ? `
          <h3>📁 Repositories</h3>
          ${builder.repos.map(repo => `
            <div class="repo-item">
              <div class="repo-name">
                <a href="${repo.url}" target="_blank">${repo.name}</a>
                ${repo.hasCode ? ' ✅' : ' ❌'}
              </div>
              <div>${repo.description || 'No description'}</div>
              <small>
                ${repo.hasCode ? `📄 ${repo.fileCount} code files` : '⚠️ Empty repository'}
                ${repo.stars > 0 ? ` | ⭐ ${repo.stars} stars` : ''}
              </small>
            </div>
          `).join('')}
        ` : ''}
      `;
      
      resultDiv.classList.add('show');
    }
    
    function displayLeaderboard(builders) {
      const leaderboardDiv = document.getElementById('leaderboard');
      
      if (!builders || builders.length === 0) {
        leaderboardDiv.innerHTML = 'No builders scanned yet. Start scanning!';
        return;
      }
      
      leaderboardDiv.innerHTML = builders.map((b, i) => `
        <div class="leaderboard-item">
          <span>#${i+1}</span>
          <span><strong>@${b.username}</strong></span>
          <span>Score: <strong>${b.score}</strong></span>
          <span>${b.isRealBuilder ? '✅' : '❌'}</span>
        </div>
      `).join('');
    }
    
    function showError(message) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `<div class="error">❌ Error: ${message}</div>`;
      resultDiv.classList.add('show');
    }
    
    // Load leaderboard on page load
    async function loadLeaderboard() {
      try {
        const response = await fetch('/api/leaderboard');
        const data = await response.json();
        if (data.success) {
          displayLeaderboard(data.builders);
        }
      } catch (error) {
        console.error('Error loading leaderboard:', error);
      }
    }
    
    loadLeaderboard();
    
    // Enter key support
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') scanBuilder();
    });
  </script>
</body>
</html>
